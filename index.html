<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>議長発話練習アプリ（スキップ機能追加版）</title>
  <style>
    /* 既存のスタイルを継承 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: #f0f4f8; color: #1a1a2e; min-height: 100vh; }
    header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 16px 24px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.05em; }
    header p  { font-size: 0.8rem; opacity: 0.7; margin-top: 4px; }
    .container { max-width: 860px; margin: 0 auto; padding: 20px 16px; }
    .progress-bar-wrap { background: #dde3ea; border-radius: 8px; height: 8px; margin-bottom: 16px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #4ade80, #22d3ee); border-radius: 8px; transition: width 0.4s ease; }
    .card { background: white; border-radius: 16px; padding: 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px; }
    .speaker-badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; margin-bottom: 14px; }
    .badge-pc { background: #e0f2fe; color: #0369a1; }
    .badge-you { background: #fef9c3; color: #92400e; border: 2px solid #fbbf24; }
    .speaker-label { font-size: 0.85rem; font-weight: 700; margin-bottom: 6px; color: #374151; }
    .script-text { font-size: 1.05rem; line-height: 2; color: #1f2937; white-space: pre-wrap; }
    .your-turn-card { border: 3px solid #fbbf24; background: #fffbeb; }
    .controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
    button { padding: 12px 24px; border-radius: 10px; border: none; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn-play { background: #22c55e; color: white; }
    .btn-next { background: #3b82f6; color: white; }
    .btn-prev { background: #6b7280; color: white; }
    .btn-stop { background: #ef4444; color: white; }
    .btn-skip { background: #94a3b8; color: white; } /* スキップ用：少し控えめな色 */
    .btn-autoread { background: #ff9800; color: white; }
    .context-panel { background: #f8fafc; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
    .context-list { list-style: none; height: 120px; overflow-y: auto; }
    .context-list li { font-size: 0.88rem; padding: 3px 0; color: #374151; border-left: 3px solid #e2e8f0; padding-left: 10px; margin-bottom: 4px; }
    .context-list li.done { color: #9ca3af; text-decoration: line-through; }
    .context-list li.current { border-color: #fbbf24; color: #92400e; font-weight: 700; background: #fffbeb; }
    .speed-wrap { display: flex; align-items: center; gap: 10px; font-size: 0.82rem; color: #6b7280; margin-bottom: 16px; justify-content: center; }
    .autoplay-active { border: 3px solid #ff9800 !important; }
  </style>
</head>
<body>

<header>
  <h1>🎙 議長 発話練習アプリ</h1>
  <p>令和７年度 宇田川原町内会 総会（スキップ機能追加版）</p>
</header>

<div class="container">
  <div class="speed-wrap">
    <label for="speedRange">読み上げ速度：</label>
    <input type="range" id="speedRange" min="0.6" max="1.4" step="0.1" value="0.9">
    <span id="speedVal">0.9x</span>
  </div>

  <div class="context-panel">
    <h3>📋 進行状況</h3>
    <ul class="context-list" id="contextList"></ul>
  </div>

  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
  <div id="mainArea"></div>
  <div class="controls" id="controls"></div>
</div>

<script>
// シナリオデータ（改善版）
const SCENARIO = [
  { speaker: "司会", role: "pc", label: "【司会】", text: "皆さま、おはようございます。ただいまより、「令和7年度宇田川原町内会 総会」を開催いたします。会員38名のうち、出席26名、委任状6名、合計32名の参加をいただいております。規約第18条に基づき、過半数に達しておりますので、本総会は成立しております。それでは、最初に大神会長よりご挨拶をいただきます。大神会長、よろしくお願いいたします。" },
  { speaker: "大神会長", role: "pc", label: "【大神会長】", text: "（会長あいさつ）" },
  { speaker: "司会", role: "pc", label: "【司会】", text: "大神会長、ありがとうございました。続きまして、祝電をご紹介いたします。福岡県議会議員 塩生さま、福岡市議会議員 諸隈さま。以上2名の方より、お祝いのメッセージを頂戴しております。それでは、議事に入ります。まず、本日の議長を選出いたします。どなたか立候補、またはご推薦はございますでしょうか？……特にないようですので、事務局より末次さんを推薦いたします。ご承認いただける方は、拍手をお願いします。" },
  { speaker: "議長（あなた）", role: "you", label: "【議長】", text: "皆さま、本日は議長を務めさせていただきます。末次でございます。書記は木下副会長、議事録署名人は大神伸雄さん、中村茂人さんにお願いしております。それでは議事に入ります。第1号議案「令和7年度事業報告」、第2号議案「令和7年度決算報告」は関連しておりますので、一括して説明を受けたいと思います。まずは大神会長より事業報告をお願いします。" },
  { speaker: "大神会長", role: "pc", label: "【大神会長】", text: "（事業報告の説明）" },
  { speaker: "議長（あなた）", role: "you", label: "【議長】", text: "続きまして、井手会計より決算報告をお願いします。" },
  { speaker: "井手会計", role: "pc", label: "【井手会計】", text: "（決算報告の説明）" },
  { speaker: "議長（あなた）", role: "you", label: "【議長】", text: "監事の中村さんより監査報告をお願いします。" },
  { speaker: "中村監事", role: "pc", label: "【中村監事】", text: "（監査報告の説明）" },
  { speaker: "議長（あなた）", role: "you", label: "【議長】", text: "ただ今の報告について、ご質問やご意見はございますか？……特にないようですので、第1号・第2号議案を原案どおり承認したいと思います。承認いただける方は、拍手をお願いします。ありがとうございます。" },
  { speaker: "議長（あなた）", role: "you", label: "【議長】", text: "続きまして、第3号議案「令和8年度新役員（案）」です。大神会長より候補者の紹介をお願いします。" },
  { speaker: "大神会長", role: "pc", label: "【大神会長】", text: "（候補者の紹介）" },
  { speaker: "議長（あなた）", role: "you", label: "【議長】", text: "ただ今ご紹介いただきました新役員案について、承認いただける方は拍手をお願いします。ありがとうございます。承認されましたので役員の交代をお願いします。新役員の皆さま、簡単にご挨拶をお願いします。" },
  { speaker: "新役員", role: "pc", label: "【新役員】", text: "（新役員の挨拶）" },
  { speaker: "議長（あなた）", role: "you", label: "【議長】", text: "それでは議事を続行いたします。第4号議案「令和8年度事業計画案」、第5号議案「令和8年度予算案」は関連しておりますので、一括して説明を受けたいと思います。まずは、新しく就任されました大神会長より、事業計画案の説明をお願いします。" },
  { speaker: "大神会長（新）", role: "pc", label: "【新会長】", text: "（事業計画案の説明）" },
  { speaker: "議長（あなた）", role: "you", label: "【議長】", text: "続いて、新会計の永井さんより予算案の説明をお願いします。" },
  { speaker: "永井会計（新）", role: "pc", label: "【新会計】", text: "（予算案の説明）" },
  { speaker: "議長（あなた）", role: "you", label: "【議長】", text: "ただ今の説明について、ご質問やご意見はございますか？……特にないようでしたら、第4号・第5号議案を原案どおり承認したいと思います。承認いただける方は、拍手をお願いします。ありがとうございます。承認されました。" },
  { speaker: "議長（あなた）", role: "you", label: "【議長】", text: "続きまして、「その他」の議題に入ります。お宮当番さん、説明をお願いします。" },
  { speaker: "お宮当番", role: "pc", label: "【お宮当番】", text: "（お宮当番要領の見直し説明）" },
  { speaker: "議長（あなた）", role: "you", label: "【議長】", text: "ただ今の説明について、ご質問はございますか？……ないようでしたら、承認いただける方は拍手をお願いします。ありがとうございます。見直し案は承認されました。" },
  { speaker: "議長（あなた）", role: "you", label: "【議長】", text: "以上で、審議はすべて終了しました。最後に、ご意見はございますでしょうか？……ないようですので、議長を退任させていただきます。ご協力ありがとうございました。" },
  { speaker: "司会", role: "pc", label: "【司会】", text: "末次議長、ありがとうございました。これをもちまして、総会を終了いたします。お帰りの際は「お弁当」と「お茶」をお持ち帰りください。本日はありがとうございました。" }
];

let current = 0;
let speed = 0.9;
let isAutoplay = false;

// 音声再生（ナレーション変換機能付き）
function speak(text, role, onEnd) {
  speechSynthesis.cancel();
  let targetText = text;

  // 「〜方」を「〜かた」で読み上げ（「方法」などの「ほう」読みは残す）
  targetText = targetText.replace(/方法/g, '__HOU__');
  targetText = targetText.replace(/方/g, 'かた');
  targetText = targetText.replace(/__HOU__/g, '方法');

  // 固有名詞の読みを補正（大神＝おおがみ）
  targetText = targetText.replace(/大神/g, 'おおがみ');

  if (role === "pc") {
    const match = text.match(/（([^）]*)）/);
    if (match) {
      targetText = match[1] + "が行われます。";
    }
  }

  const utterance = new SpeechSynthesisUtterance(targetText);
  utterance.lang = 'ja-JP';
  utterance.rate = speed;
  if (role === "you") {
    utterance.pitch = 0.5; // 男性っぽい声にするためピッチを下げる
  }
  utterance.onend = onEnd;
  speechSynthesis.speak(utterance);
}

function render() {
  const total = SCENARIO.length;
  const pct = Math.round((current / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';

  const ul = document.getElementById('contextList');
  ul.innerHTML = '';
  SCENARIO.forEach((s, i) => {
    const li = document.createElement('li');
    li.textContent = s.label + " " + s.text.substring(0, 15) + "...";
    if (i < current) li.className = 'done';
    else if (i === current) li.className = 'current';
    ul.appendChild(li);
  });

  const area = document.getElementById('mainArea');
  if (current >= total) {
    isAutoplay = false;
    area.innerHTML = `<div class="card" style="text-align:center"><h2>練習完了</h2><button class="btn-autoread" onclick="location.reload()">最初から</button></div>`;
    return;
  }

  const s = SCENARIO[current];
  const isYou = s.role === 'you';
  
  area.innerHTML = `
    <div class="card ${isYou ? 'your-turn-card' : ''} ${isAutoplay ? 'autoplay-active' : ''}">
      <div class="speaker-badge ${isYou ? 'badge-you' : 'badge-pc'}">
        ${isAutoplay ? '▶ 自動進行中' : (isYou ? '🎤 あなたの番' : '🔊 PC読み上げ')}
      </div>
      <div class="speaker-label">${s.label}</div>
      <div class="script-text">${s.text}</div>
    </div>`;

  const ctrl = document.getElementById('controls');
  
  // 基本ボタン：前へ
  let html = `<button class="btn-prev" onclick="goToPrev()">◀ 前へ</button>`;

  if (isAutoplay) {
    // 連続再生中：停止ボタン ＋ 再生しないスキップボタン
    html += `<button class="btn-stop" onclick="stopAutoplay()">⏹ 停止</button>`;
    html += `<button class="btn-skip" onclick="skipWithoutReading()">⏩ 音声なしで次へ</button>`;
  } else {
    // 通常時：再生系 ＋ 再生しないスキップボタン
    if (isYou) {
      html += `<button class="btn-next" onclick="goToNext()">✅ 完了して次へ</button>`;
    } else {
      html += `<button class="btn-play" onclick="startSingleReading()">🔊 再生して次へ</button>`;
    }
    html += `<button class="btn-skip" onclick="skipWithoutReading()">⏩ 音声なしで次へ</button>`;
    html += `<button class="btn-autoread" onclick="startAutoplay()">🔁 最初から聞き流す</button>`;
  }
  ctrl.innerHTML = html;
}

// 再生せずに次へ（スキップ）
function skipWithoutReading() {
  speechSynthesis.cancel();
  // 聞き流しモード中なら、ループの続きを阻害しないように処理
  if (isAutoplay) {
    current++;
    render();
    // 連続再生を継続
    runAutoplayLoop();
  } else {
    current++;
    render();
  }
}

function startSingleReading() {
  speak(SCENARIO[current].text, SCENARIO[current].role, () => { current++; render(); });
}

function startAutoplay() {
  isAutoplay = true; current = 0; render(); runAutoplayLoop();
}

function runAutoplayLoop() {
  if (!isAutoplay || current >= SCENARIO.length) { isAutoplay = false; render(); return; }
  speak(SCENARIO[current].text, SCENARIO[current].role, () => {
    if (isAutoplay) {
      current++; render();
      // 質問や拍手の後には3秒、それ以外は1.5秒待つ
      const delay = SCENARIO[current - 1].text.includes('ご質問') || SCENARIO[current - 1].text.includes('拍手をお願いします') ? 3000 : 1500;
      setTimeout(runAutoplayLoop, delay);
    }
  });
}

function stopAutoplay() { speechSynthesis.cancel(); isAutoplay = false; render(); }
function goToNext() { speechSynthesis.cancel(); current++; render(); }
function goToPrev() { speechSynthesis.cancel(); if (current > 0) current--; render(); }

document.getElementById('speedRange').addEventListener('input', function() {
  speed = parseFloat(this.value);
  document.getElementById('speedVal').textContent = speed.toFixed(1) + 'x';
});

window.onload = render;
</script>
</body>
</html>
